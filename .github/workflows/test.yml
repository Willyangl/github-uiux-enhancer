name: Test

on:
  # 無効化: push/PR トリガーをコメントアウト
  # workflow_dispatch:
  # push:
  #   branches: ['**']
  # pull_request:
  #   branches: [main]

  # このワークフローを無効にするため、存在しないイベントで発火させる
  schedule:
    - cron: '0 0 31 2 *'  # 2月31日 = 永遠に発火しない

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
